const SITE_CLASS = {
  'SUUMO': 'site-SUUMO',
  "HOME'S": 'site-HOMES',
  'athome': 'site-athome',
  'けんさくん': 'site-kensakun'
};

function parseRent(rentStr) {
  const m = rentStr.match(/([\d.]+)万/);
  return m ? Math.round(parseFloat(m[1]) * 10000) : 0;
}

function fmtYen(num) {
  if (!num) return '-';
  if (num >= 10000) return (num / 10000).toFixed(1).replace('.0', '') + '万円';
  return num.toLocaleString() + '円';
}

function fmtParking(r) {
  // 駐車場代を相場見積もりした場合は ≈1万 と表示
  if (r.parking_estimated) {
    return `<span class="parking-unknown" title="${r.parking_note||'不明'}のため相場で見積り">≈${fmtYen(r.parking_cost)}</span>`;
  }
  const fee = r.parking_fee;
  if (fee === 0) return '<span class="parking-none">なし</span>';
  if (fee > 0) return fmtYen(fee);
  const label = r.parking_note || '要確認';
  return `<span class="parking-unknown">${label}</span>`;
}

function rentClass(num) {
  if (num <= 65000) return 'rent-low';
  if (num <= 75000) return 'rent-mid';
  return 'rent-high';
}

function scoreClass(s) {
  if (s >= 70) return 'rent-low';
  if (s >= 50) return 'rent-mid';
  return 'rent-high';
}

const GAS_LABEL = { '都市ガス': '都市ガス', 'プロパン': 'プロパン' };
function fmtUnknown(v) {
  if (v === null || v === undefined || v === '') return '<span class="parking-none">不明</span>';
  return v;
}
function fmtNum(v, suffix) {
  if (v === null || v === undefined) return '<span class="parking-none">不明</span>';
  return v + suffix;
}

let allData = [];
let sortCol = 'score';
let sortAsc = false;

function buildRows(data) {
  return data.map(item => {
    const rentNum = parseRent(item.rent);
    const manageNum = item.manage_fee || 0;
    const surface = item.surface_rent != null ? item.surface_rent : (item.total || (rentNum + manageNum));
    const jisshitsu = item.jisshitsu_rent != null ? item.jisshitsu_rent : surface;
    return {
      ...item,
      rent_num: rentNum,
      manage_fee: manageNum,
      surface_rent: surface,
      jisshitsu_rent: jisshitsu,
      total: item.total != null ? item.total : surface,
      score: item.score != null ? item.score : 0,
      parking_fee: item.parking_fee !== undefined ? item.parking_fee : -1,
      parking_note: item.parking_note || '',
      parking_cost: item.parking_cost != null ? item.parking_cost : 0,
      parking_estimated: !!item.parking_estimated
    };
  });
}

function renderTable() {
  const site = document.getElementById('filter-site').value;
  const station = document.getElementById('filter-station').value;
  const madori = document.getElementById('filter-madori').value;
  const rentLimit = parseInt(document.getElementById('filter-rent').value) || 0;

  let filtered = allData.filter(r => {
    if (site && r.site !== site) return false;
    if (station && r.station !== station) return false;
    if (madori && r.madori !== madori) return false;
    if (rentLimit > 0 && r.jisshitsu_rent > rentLimit) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    if (typeof vb === 'string') vb = vb.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('table-body');
  const noResults = document.getElementById('no-results');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noResults.classList.remove('hidden');
  } else {
    noResults.classList.add('hidden');
    tbody.innerHTML = filtered.map((r, i) => {
      const rc = rentClass(r.jisshitsu_rent);
      const siteCls = SITE_CLASS[r.site] || '';
      const surfaceDisp = fmtYen(r.surface_rent);
      const jisshitsuDisp = fmtYen(r.jisshitsu_rent);
      const parkingDisp = fmtParking(r);
      const adj = r.utility_adj || 0;
      const breakdown = `家賃${r.score_rent ?? '-'} / 築${r.score_age ?? '-'} / 徒歩${r.score_walk ?? '-'} / ガス${r.score_gas ?? '-'}`;
      const jisTitle = `表面${(r.surface_rent||0).toLocaleString()}円 ＋ 光熱費補正${adj.toLocaleString()}円`;
      return `<tr>
        <td class="total-cell ${scoreClass(r.score)}" title="${breakdown}">${r.score}</td>
        <td><span class="site-badge ${siteCls}">${r.site}</span></td>
        <td class="station-cell">${r.station}</td>
        <td class="name-cell">${r.name}</td>
        <td class="madori-cell">${r.madori}</td>
        <td class="manage-cell">${surfaceDisp}</td>
        <td class="total-cell ${rc}" title="${jisTitle}">${jisshitsuDisp}</td>
        <td class="floor-cell">${fmtNum(r.age_years, '年')}</td>
        <td class="floor-cell">${fmtNum(r.walk_min, '分')}</td>
        <td class="parking-cell">${fmtUnknown(GAS_LABEL[r.gas_type])}</td>
        <td class="floor-cell">${fmtUnknown(r.heating)}</td>
        <td class="parking-cell">${parkingDisp}</td>
        <td>${r.url ? `<a class="detail-link" href="${r.url}" target="_blank">詳細</a>` : '-'}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('result-count').textContent = `${filtered.length}件表示`;
}

// ソートヘッダー
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
    renderTable();
  });
});

// フィルター
['filter-site','filter-station','filter-madori','filter-rent'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderTable);
});

// データ読み込み
try {
  const raw = JSON.parse(DATA_JSON);
  allData = buildRows(raw);
  document.getElementById('header-count').textContent = `合計 ${allData.length}件`;
  const sortedTh = document.querySelector('th[data-col="score"]');
  sortedTh.classList.add('sorted');
  sortedTh.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
